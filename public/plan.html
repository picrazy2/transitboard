<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Plan a journey</title>
<meta name="description" content="Plan a cycle + transit journey anywhere across London.">
<link rel="manifest" href="/stokey/manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="/stokey/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/stokey/icon-512.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="/stokey/board.css?v=20260722233512">
<link rel="stylesheet" href="/stokey/home.css?v=20260723173717">
</head>
<body class="homeapp">
<div id="map"></div>

<div class="hbar" id="hbar">
  <div class="hrow">
    <span class="hdot from"></span>
    <input id="hOrigin" type="text" placeholder="Start" autocomplete="off" spellcheck="false" enterkeyhint="search">
  </div>
  <div class="hrule"></div>
  <div class="hrow">
    <span class="hdot to"></span>
    <input id="hDest" type="text" placeholder="Where to?" autocomplete="off" spellcheck="false" enterkeyhint="search">
  </div>
  <div class="hresults" id="hResults" hidden></div>
</div>

<div class="hmappick" id="hMapPick" hidden></div>
<button id="hRecenter" class="hfab" title="Recentre" aria-label="Recentre"></button>

<div class="drawer" id="drawer" data-snap="mid">
  <div class="draghandle" id="dragHandle"><span></span></div>
  <div class="drawerhdr">
    <div class="drawertitle">Plan a journey</div>
    <div class="drawerupd" id="hUpdated"></div>
  </div>
  <div class="hmodetog" id="hModeTog">
    <button data-m="cycle" class="on" type="button">Cycle</button>
    <button data-m="walk" type="button">Walk</button>
  </div>
  <div class="hoptions" id="hOptions"><div class="jploading">Enter a start and destination to see routes.</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="/stokey/home.js?v=20260723210000"></script>
</body>
</html>
