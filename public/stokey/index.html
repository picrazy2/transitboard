<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stoke Newington Board</title>
<link rel="manifest" href="/stokey/manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/icon.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root{
    --bg:#0f1115;--ink:#e6e8ee;--muted:#9aa3b2;--rule:#242a36;--panel:#161a22;--row:#111523;
    --weaver:#823a62;--bus:#e1251b;--night:#1b2a6b;
    --ok:#20c05b;--warn:#f2c94c;--bad:#ff6b6b;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--ink);overflow:hidden;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
    display:flex;flex-direction:column;min-height:100dvh;
    padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
  }

  header{padding:8px 14px;border-bottom:1px solid var(--rule);display:flex;gap:16px;align-items:flex-end;justify-content:space-between}
  .clock{font-size:clamp(52px,6.4vw,96px);font-weight:800;line-height:1;letter-spacing:.5px;font-variant-numeric:tabular-nums}
  .clock .sec{font-size:.45em;font-weight:600;opacity:.85}
  .headmeta{flex:1;display:flex;flex-direction:column;align-items:flex-end;text-align:right;min-width:0}
  .stamp{font-size:12px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
  .stamp.stale{color:var(--warn)}
  .stamp.err{color:var(--bad)}

  .wx{display:flex;align-items:center;gap:14px;margin-top:8px}
  .wx .now{display:flex;align-items:baseline;gap:8px}
  .wx .temp{font-size:52px;font-weight:800;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .wx .icon{font-size:40px;line-height:1}
  .wx .meta{font-size:13px;color:var(--muted);text-align:right;line-height:1.4}
  .wx .hilo{font-variant-numeric:tabular-nums}
  .wx .hilo .hi{color:#ffb26b;font-weight:700}
  .wx .hilo .lo{color:#79b8ff;font-weight:700}
  .hours{display:flex;gap:12px;border-left:1px solid var(--rule);padding-left:14px}
  .hour{text-align:center;font-size:12px;color:var(--muted);line-height:1.35}
  .hour .hicon{display:block;font-size:17px;line-height:1.25}
  .hour b{display:block;color:var(--ink);font-size:14px;font-variant-numeric:tabular-nums}

  /* Chips remove a line entirely. Tapping a row or a labelled stop dims the
     rest instead — a focus, not a filter. */
  .chiprow{display:flex;align-items:center;gap:12px;padding:9px 14px 0}
  .filters{display:flex;flex-wrap:wrap;gap:7px;flex:1;min-width:0}
  .chip{font:800 12px/1 system-ui;color:#fff;border:1px solid transparent;border-radius:999px;
        padding:6px 11px;cursor:pointer;opacity:.32;background:#e1251b;transition:opacity .12s ease}
  .chip.weaver{background:var(--weaver)} .chip.night{background:var(--night)}
  .chip.all{background:transparent;border-color:var(--rule);color:var(--muted);opacity:1}
  .chip.all.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .chip.on{opacity:1}
  .chip:focus-visible{outline:2px solid #fff;outline-offset:1px}

  .wrap{padding:12px;display:flex;flex:1;min-height:0}
  /* The track list keeps three columns in every state so the widths can be
     interpolated; a dropped panel collapses to 0fr and fades, rather than
     disappearing, which display:none would make unanimatable. */
  .cols{display:grid;gap:12px;width:100%;
        grid-template-columns:1.15fr 1.15fr 0.95fr;
        grid-template-rows:1fr;
        grid-template-areas:"in out map";
        transition:grid-template-columns .34s cubic-bezier(.4,0,.2,1),
                   grid-template-rows .34s cubic-bezier(.4,0,.2,1)}
  #inPanel{grid-area:in} #outPanel{grid-area:out} #mapPanel{grid-area:map}

  /* Focus one row and the other direction has nothing to say — drop it and give
     the space to the map. Narrow by chip and both directions still matter, so
     stack them in one column instead. */
  .cols.solo-in {grid-template-columns:1.15fr 0fr 2.1fr}
  .cols.solo-out{grid-template-columns:0fr 1.15fr 2.1fr}
  .cols.stacked{grid-template-columns:1.15fr 0fr 2.1fr;grid-template-rows:1fr 1fr;
                grid-template-areas:"in . map" "out . map"}
  /* A stop is only ever the nearest for one direction, so one half of the stack
     would otherwise be a card saying "Nothing due". */
  .cols.stacked .panel.novalue{display:none}
  .cols.stacked.one-row{grid-template-rows:1fr}

  .panel{min-width:0;transition:opacity .22s ease,padding .34s cubic-bezier(.4,0,.2,1)}
  .cols.solo-in  #outPanel,
  .cols.solo-out #inPanel{opacity:0;pointer-events:none;overflow:hidden;
                          padding-left:0;padding-right:0;border:0}

  @media (prefers-reduced-motion:reduce){
    .cols,.panel{transition:none}
  }

  @media (max-aspect-ratio:1/1){
    .cols{grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;
          grid-template-areas:"in out" "map map"}
    #mapPanel{min-height:340px}
  }
  .panel{background:var(--panel);border-radius:14px;padding:10px 12px;display:flex;flex-direction:column;min-height:0}
  .panel h2{margin:0 0 10px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
  .panel h2 .count{color:var(--muted);font-weight:600;font-size:13px}
  .panel h2 .only{margin-left:auto;font:700 10.5px/1 system-ui;color:var(--muted);cursor:pointer;
                  background:transparent;border:1px solid var(--rule);border-radius:999px;padding:4px 9px}
  .panel h2 .only[aria-pressed="true"]{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .list{display:flex;flex-direction:column;gap:8px;overflow:auto;flex:1;min-height:0;padding-right:4px}
  .empty{color:var(--muted);font-size:14px;padding:16px 4px}

  .row{border:1px solid var(--rule);border-radius:12px;padding:8px 11px;background:var(--row);
       display:grid;grid-template-columns:auto 1fr auto;gap:11px;align-items:center;
       cursor:pointer;transition:opacity .12s ease}
  .row.dim{opacity:.3}
  .badge{min-width:42px;height:31px;border-radius:8px;display:grid;place-items:center;
         font-weight:800;font-size:16px;color:#fff;background:var(--bus);font-variant-numeric:tabular-nums}
  .badge.night{background:var(--night)}
  .badge.rail{background:var(--weaver)}   /* same width as a bus badge */
  .mid{min-width:0}
  .late{color:var(--bad);font-weight:700}
  .ontime{color:var(--ok);font-weight:700}
  .cancelled{color:var(--bad);font-weight:700}
  .from s{opacity:.65;text-decoration-thickness:1px}
  .row.off{opacity:.55}
  .row.off .etas .n{text-decoration:line-through;color:var(--bad)}
  .to{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .from{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Two fixed columns, so "0:41", "12:07" and "Due" all occupy the same cell
     and line up down the list. */
  .etas{display:grid;grid-template-columns:58px 46px;gap:6px;align-items:baseline;
        font-variant-numeric:tabular-nums}
  .etas .n{font-size:20px;font-weight:800;text-align:right;letter-spacing:-.01em}
  .etas .n.due{font-size:17px;color:var(--ok)}
  .etas .rest{font-size:13px;color:var(--muted);text-align:right}

  /* You cannot reach this one on foot before it goes. */
  .warn{display:none;color:var(--warn)}
  .row.unreachable .warn{display:inline}
  .row.unreachable{border-color:#4a3a1c;background:#191509}
  .row.unreachable .etas .n{color:var(--warn)}
  .row.unreachable .to{color:#cfc39a}

  #mapPanel{padding:0;overflow:hidden;position:relative}
  #map{flex:1;min-height:0;background:#0b0d11;border-radius:14px}
  .leaflet-container{background:#0b0d11}
  .mapctl{position:absolute;right:10px;top:10px;z-index:600;display:flex;flex-direction:column;gap:6px}
  .mapctl button{width:32px;height:32px;background:rgba(15,17,21,.86);color:var(--ink);
                 border:1px solid var(--rule);border-radius:8px;font-size:15px;cursor:pointer;line-height:1}
  .mapctl button[aria-expanded="true"]{background:var(--ink);color:var(--bg)}
  /* The map panel lifts out of the grid rather than using the Fullscreen API,
     which iOS does not offer for arbitrary elements. It stops below the clock,
     weather and chips, which stay useful while the map is large. */
  #mapPanel.full{position:fixed;left:0;right:0;bottom:0;top:var(--chrome,0px);
                 z-index:2000;border-radius:0;background:var(--bg)}
  #mapPanel.full #map{border-radius:0}
  .maplabel{background:rgba(15,17,21,.82)!important;border:none!important;box-shadow:none!important;
            color:var(--ink)!important;font:700 10px system-ui;padding:2px 5px!important;
            border-radius:4px;transition:opacity .12s ease}
  .maplabel::before{display:none!important}
  .maplabel.rail{color:#e8c6dd!important}
  /* A panel pinned to the map's corner, rather than a popup that covers whatever
     you just tapped. */
  .mapinfo[hidden]{display:none}
  .mapinfo{position:absolute;left:12px;top:12px;z-index:700;max-width:260px;
           background:rgba(15,17,21,.92);border:1px solid var(--rule);border-radius:10px;
           padding:10px 12px;font-size:13px;line-height:1.5;backdrop-filter:blur(6px)}
  .mapinfo b{font-size:14px}
  .infoclose{position:absolute;right:6px;top:4px;background:none;border:0;color:var(--muted);
             font-size:17px;line-height:1;cursor:pointer;padding:2px 5px}
  .maplegend[hidden]{display:none}
  .maplegend{position:absolute;left:12px;bottom:12px;z-index:500;background:rgba(15,17,21,.86);
             border:1px solid var(--rule);border-radius:10px;padding:8px 10px;font-size:12px;
             display:flex;flex-direction:column;gap:5px;backdrop-filter:blur(4px)}
  .maplegend div{display:flex;align-items:center;gap:7px;color:var(--muted)}
  .swatch{width:16px;height:3.5px;border-radius:2px}
  .dot{width:9px;height:9px;border-radius:50%;border:2px solid #fff;background:#0f1115}
  .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#1b2030;color:var(--ink)}
  .leaflet-popup-content{margin:9px 12px;font-size:13px;line-height:1.5}
  .leaflet-popup-content b{font-size:14px}
  .leaflet-control-attribution{background:rgba(15,17,21,.75)!important;color:#6c7484!important}
  .leaflet-control-attribution a{color:#8a93a5!important}
</style>
</head>
<body>
<header>
  <div class="clock" id="clock">--:--<span class="sec">:--</span></div>
  <div class="headmeta">
    <div class="wx" id="wx"></div>
  </div>
</header>
<div class="chiprow">
  <div class="filters" id="filters"></div>
  <div class="stamp" id="stamp">Loading&hellip;</div>
</div>

<div class="wrap">
  <div class="cols" id="cols">
    <section class="panel" id="inPanel">
      <h2>Into London <span class="count" id="inCount"></span>
        <button class="only" data-dir="in" title="Show only this direction">Only</button></h2>
      <div class="list" id="inList"><div class="empty">Loading&hellip;</div></div>
    </section>

    <section class="panel" id="outPanel">
      <h2>Out of London <span class="count" id="outCount"></span>
        <button class="only" data-dir="out" title="Show only this direction">Only</button></h2>
      <div class="list" id="outList"><div class="empty">Loading&hellip;</div></div>
    </section>

    <section class="panel" id="mapPanel">
      <div id="map"></div>
      <div class="mapctl">
        <button id="fullscreen" title="Full screen">&#10530;</button>
        <button id="recentre" title="Back to Stoke Newington">&#9678;</button>
        <button id="legendBtn" title="Legend" aria-expanded="false">i</button>
      </div>
      <div class="mapinfo" id="mapinfo" hidden>
        <button class="infoclose" id="infoclose" title="Close">&times;</button>
        <div id="infobody"></div>
      </div>
      <div class="maplegend" id="maplegend" hidden>
        <div><span class="swatch" style="background:var(--weaver);height:4px"></span> Weaver line</div>
        <div><span class="swatch" style="background:var(--bus)"></span> Bus routes</div>
        <div><span class="dot" style="border-color:#fff"></span> Stop on board</div>
        <div><span class="dot" style="border-color:#6c7484"></span> Other stop on these lines</div>
        <div><span style="color:#ff5a4d;font-size:11px">&#9650;</span> Next bus <i>(estimated)</i></div>
        <div><span style="color:#c184a9;font-size:11px">&#9650;</span> Next train <i>(estimated)</i></div>
        <div><span style="color:#8a90a0;font-size:11px">&#9650;</span> Already past your stop</div>
        <div><span style="color:#ff8f85;font-size:9px">&#9650;</span> One-way road</div>
      </div>
    </section>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const API = "/api/board/stokey";
const REFRESH_MS = 60000;
const HOME = [51.5611161, -0.0739865];

const walkMins = m => Math.max(1, Math.round(m));

// "Northwold Road / Stoke Newington Common" is a fine sign but a poor label: the
// first segment identifies the stop, and every stop here is in Stoke Newington
// so the prefix is dead weight.
function shortStop(s){
  const first = String(s ?? "").split("/")[0].trim();
  const trimmed = first.replace(/^Stoke Newington\s+/i, "");
  return trimmed || first;
}

// ---------- clock ----------
const pad = n => String(n).padStart(2, "0");
function tickClock(){
  const d = new Date();
  clock.innerHTML = `${pad(d.getHours())}:${pad(d.getMinutes())}<span class="sec">:${pad(d.getSeconds())}</span>`;
}
setInterval(tickClock, 1000); tickClock();

const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// ---------- weather ----------
// WMO code -> [emoji day, emoji night, label]
const WMO = {
  0:["☀️","🌙","Clear"], 1:["🌤️","🌙","Mostly clear"], 2:["⛅","☁️","Partly cloudy"], 3:["☁️","☁️","Overcast"],
  45:["🌫️","🌫️","Fog"], 48:["🌫️","🌫️","Rime fog"],
  51:["🌦️","🌦️","Light drizzle"], 53:["🌦️","🌦️","Drizzle"], 55:["🌦️","🌦️","Heavy drizzle"],
  56:["🌧️","🌧️","Freezing drizzle"], 57:["🌧️","🌧️","Freezing drizzle"],
  61:["🌦️","🌦️","Light rain"], 63:["🌧️","🌧️","Rain"], 65:["🌧️","🌧️","Heavy rain"],
  66:["🌧️","🌧️","Freezing rain"], 67:["🌧️","🌧️","Freezing rain"],
  71:["🌨️","🌨️","Light snow"], 73:["🌨️","🌨️","Snow"], 75:["❄️","❄️","Heavy snow"], 77:["❄️","❄️","Snow grains"],
  80:["🌦️","🌦️","Showers"], 81:["🌧️","🌧️","Showers"], 82:["⛈️","⛈️","Violent showers"],
  85:["🌨️","🌨️","Snow showers"], 86:["❄️","❄️","Snow showers"],
  95:["⛈️","⛈️","Thunderstorm"], 96:["⛈️","⛈️","Thunder, hail"], 99:["⛈️","⛈️","Thunder, hail"],
};
const hhmm = epoch => new Date(epoch * 1000).toLocaleTimeString("en-GB",
  {hour:"2-digit", minute:"2-digit", timeZone:"Europe/London"});

const wmoIcon = (code, isDay) => (WMO[code] ?? ["🌡️","🌡️","—"])[isDay ? 0 : 1];
const wmoLabel = code => (WMO[code] ?? ["","","—"])[2];

function renderWeather(w){
  if(!w){ wx.innerHTML = ""; return; }
  const hours = w.next.slice(0, 4).map(h => `
    <div class="hour">${hhmm(h.at).slice(0,2)}
      <span class="hicon">${wmoIcon(h.code, h.isDay)}</span>
      <b>${Math.round(h.tempC)}°</b></div>`).join("");
  wx.innerHTML = `
    <div class="now">
      <span class="icon">${wmoIcon(w.code, w.isDay)}</span>
      <span class="temp">${Math.round(w.tempC)}°</span>
    </div>
    <div class="meta">${esc(wmoLabel(w.code))}
      ${w.maxC != null ? `<br><span class="hilo"><span class="hi">H ${Math.round(w.maxC)}°</span>
        &nbsp;<span class="lo">L ${Math.round(w.minC)}°</span></span>` : ""}</div>
    <div class="hours">${hours}</div>`;
}

// ---------- departures ----------
// TfL's expectedArrival is a full timestamp, not a rounded minute, so the
// countdown ticks in seconds like the Stratford board. Rail estimates are only
// minute-precise upstream, so those simply tick to :00.
const RAIL_WALK_S = 348;   // 491 m, Valhalla pedestrian

function countdown(iso, fallbackMin){
  if(!iso) return {text: fallbackMin === 0 ? "Due" : `${fallbackMin} min`, secs: fallbackMin * 60};
  const secs = Math.round((Date.parse(iso) - Date.now()) / 1000);
  if(secs <= 0) return {text: "Due", secs: 0};
  return {text: `${Math.floor(secs / 60)}:${String(secs % 60).padStart(2, "0")}`, secs};
}

const etaHTML = (first, rest, exp, walkS) => {
  const c = countdown(exp, first);
  return `<span class="n ${c.secs === 0 ? "due" : ""}" data-exp="${exp ?? ""}" data-min="${first}"
                data-walk="${walkS}">${c.text}</span>`
       + `<span class="rest">${rest ? esc(rest) : ""}</span>`;
};

/** Can you still walk to the stop in time? Re-evaluated every second. */
const reachable = (secs, walkS) => secs >= walkS;

/** Whole minutes remaining, floored, so "11:03" on a row reads "11m" on its pin. */
function pinEta(iso, fallbackMin){
  if(fallbackMin == null && !iso) return "";
  if(!iso) return fallbackMin === 0 ? "Due" : `${fallbackMin}m`;
  const secs = Math.round((Date.parse(iso) - Date.now()) / 1000);
  return secs <= 0 ? "Due" : `${Math.floor(secs / 60)}m`;
}

function tickETAs(){
  for(const el of document.querySelectorAll(".pineta")){
    el.textContent = pinEta(el.dataset.exp || null, el.dataset.min === "" ? null : +el.dataset.min);
  }
  for(const el of document.querySelectorAll(".etas .n[data-exp]")){
    const c = countdown(el.dataset.exp || null, +el.dataset.min);
    el.textContent = c.text;
    el.classList.toggle("due", c.secs === 0);
    const row = el.closest(".row");
    if(row) row.classList.toggle("unreachable", !reachable(c.secs, +el.dataset.walk));
  }
}
setInterval(tickETAs, 1000);

// "Platform 1" overflows the narrow rail column; "Plat 1" fits.
const plat = p => (p && p !== "—") ? esc(p.replace(/^Platform\s+/i, "Plat ")) : "";

// TfL terminus names are written for a 40-char sign, not a board column.
// Where a name is two places joined by "/", the recognisable one is almost
// always the station: "Great Titchfield St / Oxford Circus Stn" -> "Oxford Circus Stn".
function shortDest(name){
  const norm = s => s
    .replace(/,\s*/g, " ")          // TfL writes "Tottenham Hale, Bus Station"
    .replace(/\s+/g, " ").trim()
    .replace(/\s+Rail Station$/i, "")
    .replace(/\s+Bus Station$/i, " Bus Stn")
    .replace(/\s+Station$/i, " Stn");
  const s = norm(String(name ?? "—"));
  if(s.length <= 24 || !s.includes("/")) return s;
  const parts = s.split("/").map(norm);
  return parts.find(p => /\bStn\b/.test(p)) ?? parts[0];
}

// Rail and bus share a column, split by whether they head into London or out of
// it, and interleave by ETA — the question a board answers is "what do I catch
// next", not "what mode is it".
const RAIL_STOP = "910GSTKNWNG";  // the only station with rows on this board

const railRow = r => ({rail:true, line:"Weaver", to:r.to, plat:r.plat,
                       key:`rail|${r.to}`, stopId:RAIL_STOP,
                       delayMin:r.delayMin, cancelled:r.cancelled,
                       scheduled:r.scheduled, expected:r.expected, etas:[]});

const railGroups = (rows, dir) => {
  const of = rows.filter(r => r.london === dir);
  // Once a line has been filtered down there is room to give every train its
  // own row, the way the Stratford board does it.
  if(expanded()) return of.map(r => ({...railRow(r), london:dir, etas:[r.etaMin], one:true}));
  const m = new Map();
  for(const r of of){
    if(!m.has(r.to)) m.set(r.to, {...railRow(r), london:dir});
    m.get(r.to).etas.push(r.etaMin);
  }
  return [...m.values()];
};

// Only the Weaver has a schedule to be late against. TfL exposes no scheduled
// time for buses, and there is no supported way to join a live bus to a
// timetabled trip — so a bus row never claims to know its delay.
const clockTime = iso => iso
  ? new Date(iso).toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit", timeZone:"Europe/London"})
  : "";

function statusHTML(g){
  if(!g.rail || !g.scheduled) return "";
  const sched = clockTime(g.scheduled);
  if(g.cancelled) return ` · <s>${sched}</s> <span class="cancelled">Cancelled</span>`;
  // TfL flags trains "Delayed" while still showing 0 min late; don't cry wolf.
  if(g.delayMin >= 1) return ` · <s>${sched}</s> <span class="late">${clockTime(g.expected)}</span>`;
  return ` · <span class="ontime">${sched}</span>`;
}

const busRow = r => ({rail:false, line:r.line, to:r.to, stop:r.stop, letter:r.letter,
                      walk:r.walkMin, key:`bus|${r.line}|${r.dir}`, stopId:r.stopId,
                      expected:r.expected, etas:[]});

const busGroups = (rows, dir) => {
  const of = rows.filter(r => r.london === dir);
  if(expanded()) return of.map(r => ({...busRow(r), london:dir, etas:[r.etaMin], one:true}));
  const m = new Map();
  for(const r of of){
    const k = `bus|${r.line}|${r.dir}`;
    if(!m.has(k)) m.set(k, {...busRow(r), london:dir});
    m.get(k).etas.push(r.etaMin);
  }
  return [...m.values()];
};

// "Weaver" made the rail badge wider than every bus badge, so the rows never
// lined up. There is only one line here; a train says it just as well.
const TRAIN_GLYPH = `<svg viewBox="0 0 24 24" width="19" height="19" fill="#fff" aria-hidden="true"><path d="M12 2c-4 0-8 .5-8 4v9.5A3.5 3.5 0 0 0 7.5 19L6 20.5v.5h12v-.5L16.5 19a3.5 3.5 0 0 0 3.5-3.5V6c0-3.5-4-4-8-4ZM7.5 17a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm3.5-7H6V6h5v4Zm2 0V6h5v4h-5Zm3.5 7a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"/></svg>`;

const WARN_GLYPH = `<span class="warn" title="Not enough time to walk there">⚠</span> `;

const rowHTML = g => {
  const badge = g.rail
    ? `<div class="badge rail" title="Weaver line">${TRAIN_GLYPH}</div>`
    : `<div class="badge ${g.line.startsWith("N") ? "night" : ""}">${esc(g.line)}</div>`;
  const walkS = g.rail ? RAIL_WALK_S : Math.round(g.walk * 60);
  // Only one station on this board, and the badge already names the line, so
  // lead with the platform — it is the part that changes.
  const sub = g.rail
    ? `${plat(g.plat) ? plat(g.plat) : "Station"}${statusHTML(g)}`
    : `${esc(shortStop(g.stop))}${g.letter ? " (" + esc(g.letter) + ")" : ""} · ${walkMins(g.walk)} min walk`;
  // Grouped: this ETA plus the two after it. One-per-vehicle: its clock time.
  // A rail row already carries its times in the sub-line; don't print them twice.
  const rest = g.one
    ? (g.rail ? "" : clockTime(g.expected))
    : g.etas.slice(1, 3).join(" · ");
  const miss = !reachable(countdown(g.expected, g.etas[0]).secs, walkS);
  return `
    <div class="row ${g.cancelled ? "off" : ""} ${miss ? "unreachable" : ""} ${focusMatchesRow(g) ? "" : "dim"}"
         data-key="${esc(g.key)}" data-stop="${esc(g.stopId ?? "")}">
      ${badge}
      <div class="mid">
        <div class="to">${esc(shortDest(g.to))}</div>
        <div class="from">${WARN_GLYPH}${sub}</div>
      </div>
      <div class="etas">${etaHTML(g.etas[0], rest, g.expected, walkS)}</div>
    </div>`;
};

// ---------- filtering ----------
// Two independent mechanisms, on purpose:
//   chips  — remove whole lines from the board and the map
//   focus  — tap a row or a map stop to dim everything else, without removing it
const SERVICES = ["Weaver", "67", "73", "76", "106", "149", "243", "276", "393", "476", "N73"];
// The Weaver is the departure you cannot substitute; the buses you already know.
// So the board opens on the trains alone, one column, with the map taking the
// rest — and the chips are there when you want a particular bus.
const DEFAULT_LINES = ["Weaver"];
let selected = new Set(DEFAULT_LINES);
// Until a chip is touched, `selected` describes the *table* only: the map still
// draws every line that is running. Pick a line and the map narrows with you.
let userChose = false;

// With every line shown there are ~20 routes and no room per departure, so rows
// are grouped per route with the next three ETAs. Once chips narrow the board,
// give each vehicle its own row instead — the Stratford layout.
function expanded(){ return selected.size !== SERVICES.length; }
let focus = null;          // {kind:"route", key} | {kind:"stop", id} | null
let board = null;          // last payload

const lineOf = g => g.rail ? "Weaver" : g.line;
const shown = g => selected.has(lineOf(g));

/** Which routes and stops the current focus resolves to. Recomputed per render. */
function focusSets(){
  const keys = new Set(), stops = new Set();
  if(!focus || !board) return {keys, stops, active:false};
  const groups = allGroups().filter(shown);
  for(const g of groups){
    const hit = focus.kind === "route" ? g.key === focus.key
              : focus.kind === "dir"   ? g.london === focus.dir
              :                          g.stopId === focus.id;
    if(hit){ keys.add(g.key); stops.add(g.stopId); }
  }
  return {keys, stops, active:true};
}
let FS = {keys:new Set(), stops:new Set(), active:false};

const focusMatchesRow = g => !FS.active || FS.keys.has(g.key);

function allGroups(){
  if(!board) return [];
  return ["in","out"].flatMap(d =>
    [...railGroups(board.rail ?? [], d), ...busGroups(board.buses ?? [], d)]);
}

function renderFilters(){
  const all = selected.size === SERVICES.length;
  filters.innerHTML =
    `<button class="chip all ${all ? "on" : ""}" data-all="1" title="Show every line">All</button>`
    + SERVICES.map(id => {
        const cls = id === "Weaver" ? "weaver" : id.startsWith("N") ? "night" : "bus";
        return `<button class="chip ${cls} ${selected.has(id) ? "on" : ""}" data-line="${id}">${esc(id)}</button>`;
      }).join("");
}

// Same behaviour as the Stratford board: from "everything shown", the first tap
// isolates that line rather than hiding it — one tap to see just the 73. After
// that a tap toggles, and clearing the last one shows everything again.
filters.addEventListener("click", e => {
  const b = e.target.closest(".chip");
  if(!b) return;
  userChose = true;
  if(b.dataset.all){
    selected = new Set(SERVICES);
    focus = null;
    renderFilters();
    renderAll();
    return;
  }
  const id = b.dataset.line;
  if(selected.size === SERVICES.length){
    selected = new Set([id]);
  }else if(selected.has(id)){
    selected.delete(id);
    // Clearing the last one returns to the default, not to everything.
    if(selected.size === 0) selected = new Set(DEFAULT_LINES);
  }else{
    selected.add(id);
  }
  if(focus && !focusStillVisible()) focus = null;
  renderFilters();   // the chip's own on/off state lives in this markup
  renderAll();
});

function focusStillVisible(){
  return allGroups().filter(shown).some(g =>
    focus.kind === "route" ? g.key === focus.key
    : focus.kind === "dir" ? g.london === focus.dir
    : g.stopId === focus.id);
}

function onRowClick(e){
  const row = e.target.closest(".row");
  if(!row) return;
  const key = row.dataset.key;
  focus = (focus && focus.kind === "route" && focus.key === key) ? null : {kind:"route", key};
  renderAll();
}
inList.addEventListener("click", onRowClick);
outList.addEventListener("click", onRowClick);

function focusDir(dir){
  focus = (focus && focus.kind === "dir" && focus.dir === dir) ? null : {kind:"dir", dir};
  renderAll();
}
for(const b of document.querySelectorAll(".only")){
  b.addEventListener("click", e => { e.stopPropagation(); focusDir(b.dataset.dir); });
}

function focusStop(id){
  focus = (focus && focus.kind === "stop" && focus.id === id) ? null : {kind:"stop", id};
  renderAll();
}

// Sort on the same clock the row displays. etaMin is rounded, so a bus 58 s away
// and one 86 s away both read "1" and would be ordered by luck.
const departsAt = g => g.expected ? Date.parse(g.expected) : Date.now() + g.etas[0] * 60000;

function renderDirection(dir, listEl, countEl){
  // Tapping a stop asks "what can I catch from here" — the other stops' rows are
  // not dimmed, they are gone.
  const atStop = focus && focus.kind === "stop" ? focus.id : null;
  const groups = [...railGroups(board.rail ?? [], dir), ...busGroups(board.buses ?? [], dir)]
    .filter(shown)
    .filter(g => !atStop || g.stopId === atStop)
    .sort((a,b) => departsAt(a) - departsAt(b));
  countEl.textContent = groups.length
    ? `${groups.length} ${expanded() ? "departures" : "routes"}` : "";
  listEl.innerHTML = groups.length
    ? groups.map(rowHTML).join("")
    : '<div class="empty">Nothing due.</div>';
  listEl.closest(".panel").classList.toggle("novalue", groups.length === 0);
}

/** Which column holds the focused row. Null for a stop, which serves both
    directions and so has rows in each. */
function focusedSide(){
  if(focus && focus.kind === "dir") return focus.dir;
  if(!focus || focus.kind !== "route" || !board) return null;
  for(const dir of ["in", "out"]){
    const groups = [...railGroups(board.rail ?? [], dir), ...busGroups(board.buses ?? [], dir)];
    if(groups.some(g => g.key === focus.key)) return dir;
  }
  return null;
}

let layoutClass = "";
function applyLayout(){
  const side = focusedSide();
  const stopFocus = focus && focus.kind === "stop";
  const next = side ? `solo-${side}` : (stopFocus || expanded()) ? "stacked" : "";
  if(next === layoutClass) return;
  cols.classList.remove("solo-in", "solo-out", "stacked");
  if(next) cols.classList.add(next);
  layoutClass = next;
  // Leaflet caches its container size, so it must be told throughout the
  // transition, not just once at the end.
  const until = Date.now() + 420;
  (function follow(){
    map.invalidateSize({animate:false});
    if(Date.now() < until) requestAnimationFrame(follow);
  })();
}

function renderAll(){
  if(!board) return;
  FS = focusSets();
  for(const b of document.querySelectorAll(".only")){
    b.setAttribute("aria-pressed", String(!!focus && focus.kind === "dir" && focus.dir === b.dataset.dir));
  }
  applyLayout();
  renderDirection("in",  inList,  inCount);
  renderDirection("out", outList, outCount);
  // In the stack, an empty half collapses rather than sitting there empty.
  cols.classList.toggle("one-row",
    inPanel.classList.contains("novalue") !== outPanel.classList.contains("novalue"));
  renderPins();
  applyMapFilter();
  syncFleet();
}

// ---------- the rest of the fleet ----------
// One pin per board row is too sparse once the map is full-screen or narrowed to
// a few lines. Then ask for every vehicle on those lines, including the ones
// that have already gone past our stops — those are drawn grey.
let fleetToken = 0;
async function syncFleet(){
  const lines = [...new Set(activePairs().map(pr => pr.split("|")[0]))];
  const token = ++fleetToken;
  if(!lines.length){
    if(fleet.length){ fleet = []; renderPins(); }
    return;
  }
  try{
    const res = await fetch(`/api/fleet/stokey?lines=${lines.join(",")}`, {cache:"no-store"});
    const data = res.ok ? await res.json() : {vehicles:[]};
    if(token !== fleetToken) return;   // a newer request superseded this one
    fleet = data.vehicles ?? [];
  }catch{
    if(token !== fleetToken) return;
    fleet = [];
  }
  renderPins();
  applyMapFilter();
}

// A board stop usually serves lines that a *nearer* stop already covers. Only
// the lines it is nearest for produce rows, and only those respond to tapping
// it — so the popup shows them bold and greys the rest out.
function linesHTML(p){
  const lines = p.lines ?? [];
  if(!p.onBoard) return lines.map(esc).join(", ");
  const own = new Set(p.primaryLines ?? []);
  const html = lines.map(l => own.has(l)
    ? `<b>${esc(l)}</b>`
    : `<span style="color:#6c7484">${esc(l)}</span>`).join(", ");
  const others = lines.filter(l => !own.has(l));
  return html + (others.length
    ? `<br><span style="color:#6c7484;font-size:11px">grey: a nearer stop serves these</span>`
    : "");
}

// ---------- map ----------
// Routes and stops run the full length of each line, so the board opens framed
// on the flat but you can pan out to any terminus.
const map = L.map("map", {zoomControl:false, attributionControl:true});  // pinch to zoom
const tiles = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  subdomains:"abcd", maxZoom:19,
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
}).addTo(map);
map.setView(HOME, 15);

const busLines = new Map();   // "bus|73|inbound" -> [polyline]
const railLines = [];
const stopMarkers = [];       // {id, marker, lines, onBoard}
const arrowMarkers = [];      // one-way roads; an arrow belongs to a road, not a line
let homeMarker = null;
let homeBounds = null;

let ROUTE_STOPS = {};        // "73|inbound" -> [naptanId, ...] in order
let fleet = [];              // every vehicle on the lines we asked about
const tempTips = [];         // terminus labels, bound and unbound as focus changes

// Each line's scheduled operating windows, minutes past midnight. The Weaver has
// no entry and is treated as always running.
let SERVICE = {};
const OPERATING_SLACK = 15;   // minutes of grace either side of the timetable

function operating(line, now = new Date()){
  const iv = SERVICE[line];
  if(!iv) return true;
  const m = now.getHours() * 60 + now.getMinutes();
  return iv.some(([a, b]) => m >= a - OPERATING_SLACK && m <= b + OPERATING_SLACK);
}

// A chip overrides the timetable: ask for the night bus at noon and you get it.
const onMap = line => userChose
  ? selected.has(line) && (expanded() || operating(line))
  : operating(line);

const isFull = () => mapPanel.classList.contains("full");

/**
 * The route-directions the map is currently *about*: one when a row is focused,
 * every selected line's when chips have narrowed it, and none when the board is
 * showing everything (where lighting 900 stops would say nothing).
 */
function activePairs(){
  // Opening on the Weaver is not an act of attention — the map stays as it was.
  if(!userChose && !focus) return [];
  if(focus && focus.kind === "route" && focus.key.startsWith("bus|")) return [focus.key.slice(4)];
  if(focus && focus.kind === "dir"){
    // every bus route-direction heading that way, from the board's own rows
    return [...new Set((board?.buses ?? [])
      .filter(r => r.london === focus.dir)
      .map(r => `${r.line}|${r.dir}`))].filter(pr => onMap(pr.split("|")[0]));
  }
  if(focus && focus.kind === "stop"){
    return [...new Set((board?.buses ?? [])
      .filter(r => r.stopId === focus.id)
      .map(r => `${r.line}|${r.dir}`))].filter(pr => onMap(pr.split("|")[0]));
  }
  if(expanded() || isFull()){
    return Object.keys(ROUTE_STOPS).filter(pr => onMap(pr.split("|")[0]));
  }
  return [];
}

/** Stops called at by the active route-directions, and their termini. */
function activeStops(){
  const pairs = activePairs();
  if(!pairs.length) return null;
  const all = new Set(), ends = new Set();
  for(const pr of pairs){
    const ids = ROUTE_STOPS[pr] ?? [];
    ids.forEach(id => all.add(id));
    if(ids.length){ ends.add(ids[0]); ends.add(ids[ids.length - 1]); }
  }
  return {all, ends};
}

fetch("/stokey/geo.json").then(r => r.json()).then(geo => {
  const of = kind => geo.features.filter(f => f.properties.kind === kind);
  SERVICE = geo.service ?? {};
  ROUTE_STOPS = geo.routeStops ?? {};

  // One arrow per one-way road, shared by every line that uses it.
  for(const f of of("arrow")){
    const p = f.properties, [lon, lat] = f.geometry.coordinates;
    const m = L.marker([lat, lon], {interactive:false, icon: L.divIcon({className:"", iconSize:[14,14], iconAnchor:[7,7], html:
      `<div style="width:14px;height:14px;transform:rotate(${p.bearing}deg)">
         <div style="width:0;height:0;margin:0 auto;border:3.5px solid transparent;border-bottom:6px solid #ff8f85"></div>
       </div>`})}).addTo(map);
    arrowMarkers.push({marker:m, lines:p.lines, pairs:p.pairs ?? []});
  }

  for(const f of of("bus")){
    const p = f.properties, key = `bus|${p.line}|${p.dir}`;
    const line = L.geoJSON(f, {style:{
      color: p.night ? "#5b6ed6" : "#e1251b",
      weight: p.night ? 2.5 : 3.5, opacity: p.night ? .45 : .6,
      dashArray: p.night ? "3 6" : null,
    }}).addTo(map);
    if(!busLines.has(key)) busLines.set(key, []);
    busLines.get(key).push(line);
  }

  for(const f of of("rail")) railLines.push(L.geoJSON(f, {style:{color:"#823a62", weight:5, opacity:.95}}).addTo(map));

  // Every stop gets a dot and a popup. Only the board's 7 get a permanent label.
  for(const f of of("stop")){
    const p = f.properties, [lon, lat] = f.geometry.coordinates;
    const on = p.onBoard, near = p.near;
    const m = L.circleMarker([lat, lon], {
      radius: on ? 7 : near ? 4 : 2.5,
      color: on ? "#fff" : near ? "#6c7484" : "#4a5162",
      weight: on ? 2 : 1.5, fillColor: "#0f1115", fillOpacity: 1,
    }).addTo(map);
    infoOn(m, `<b>${esc(p.name)}</b>${p.letter ? " (" + esc(p.letter) + ")" : ""}<br>
      ${p.walk_min != null ? walkMins(p.walk_min) + " min walk" : "not within a 10 min walk"}<br>
      ${linesHTML(p)}
      ${p.towards ? `<br><span style="color:#9aa3b2">towards ${esc(p.towards)}</span>` : ""}`);
    if(on){
      m.bindTooltip(`${esc(shortStop(p.name))}${p.letter ? " " + esc(p.letter) : ""}`,
        {permanent:true, direction:"right", offset:[7,0], className:"maplabel"});
      m.on("click", e => { L.DomEvent.stopPropagation(e); focusStop(p.id); });
    }
    stopMarkers.push({id:p.id, marker:m, lines:p.lines, onBoard:on, rail:false, name:p.name,
                      base:{radius: on ? 7 : near ? 4 : 2.5,
                            color: on ? "#fff" : near ? "#6c7484" : "#4a5162",
                            weight: on ? 2 : 1.5}});
  }

  for(const f of of("station")){
    const p = f.properties, [lon, lat] = f.geometry.coordinates;
    const on = p.onBoard;  // Rectory Road is a 7.7 min walk, but every train calls here first
    const size = on ? 15 : 9;
    const m = L.marker([lat, lon], {icon: L.divIcon({className:"", iconSize:[size,size], html:
      `<div style="width:${size}px;height:${size}px;background:#823a62;
                   border:${on ? 2.5 : 1.5}px solid ${on ? "#fff" : "#8a6d7c"};border-radius:3px"></div>`})})
      .addTo(map);
    infoOn(m, `<b>${esc(p.name)}</b><br>Weaver line${p.walk_min != null ? ` · ${walkMins(p.walk_min)} min walk` : ""}`);
    if(on){
      m.bindTooltip(esc(p.name), {permanent:true, direction:"right", offset:[9,0], className:"maplabel rail"});
      m.on("click", () => focusStop(p.id));
    }
    stopMarkers.push({id:p.id, marker:m, lines:["Weaver"], onBoard:on, rail:true});
  }

  const [lon, lat] = of("home")[0].geometry.coordinates;
  homeMarker = L.marker([lat, lon], {icon: L.divIcon({className:"", iconSize:[17,17], html:
    `<div style="width:17px;height:17px;background:#20c05b;border:3px solid #0f1115;border-radius:50%;
                 box-shadow:0 0 0 2px #20c05b"></div>`})}).addTo(map);
  infoOn(homeMarker, "<b>Home</b><br>149 Stoke Newington High St");

  // Open framed on what the board uses: its 7 stops, the station, home.
  homeBounds = L.latLngBounds(
    of("stop").filter(f => f.properties.onBoard).concat(of("station").filter(f => f.properties.onBoard))
      .map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0]])
  ).extend([lat, lon]).pad(0.18);
  map.fitBounds(homeBounds, {maxZoom: 16});
  applyMapFilter();
}).catch(e => console.error("geo.json", e));

map.on("click", () => { hideInfo(); if(focus){ focus = null; renderAll(); } });
recentre.addEventListener("click", () => homeBounds && map.fitBounds(homeBounds, {maxZoom: 16}));

function showInfo(html){
  infobody.innerHTML = html;
  mapinfo.hidden = false;
}
const hideInfo = () => { mapinfo.hidden = true; };
infoclose.addEventListener("click", e => { e.stopPropagation(); hideInfo(); });

/** Tap a marker and its detail appears in the corner panel, not over the map. */
function infoOn(marker, html){
  marker.on("click", e => { L.DomEvent.stopPropagation(e); showInfo(typeof html === "function" ? html() : html); });
  return marker;
}

legendBtn.addEventListener("click", () => {
  const open = maplegend.hidden;
  maplegend.hidden = !open;
  legendBtn.setAttribute("aria-expanded", String(open));
});

fullscreen.addEventListener("click", () => {
  if(!mapPanel.classList.contains("full")){
    // Freeze where the chrome ends, before the panel leaves the flow.
    document.documentElement.style.setProperty(
      "--chrome", `${Math.round(document.querySelector(".wrap").getBoundingClientRect().top)}px`);
  }
  const full = mapPanel.classList.toggle("full");
  fullscreen.innerHTML = full ? "&#10531;" : "&#10530;";
  fullscreen.title = full ? "Exit full screen" : "Full screen";
  // Leaflet caches the container size; it must be told the panel resized.
  requestAnimationFrame(() => {
    map.invalidateSize();
    if(!full && homeBounds) map.fitBounds(homeBounds, {maxZoom: 16});
  });
  renderAll();   // full screen widens what the map is about: fetch the whole fleet
});
document.addEventListener("keydown", e => {
  if(e.key === "Escape" && mapPanel.classList.contains("full")) fullscreen.click();
});

// ---------- live buses ----------
// Positions are estimated (TfL publishes no bus coordinates); see src/vehicles.ts.
const BUS_GLYPH = `<svg viewBox="0 0 24 24" width="13" height="13" fill="#fff" aria-hidden="true"><path d="M4 16c0 .88.39 1.67 1 2.22V20a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-1h8v1a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4S4 2.5 4 6v10Zm3.5 1a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm9 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3ZM18 11H6V6h12v5Z"/></svg>`;
const TRAIN_GLYPH_SM = TRAIN_GLYPH.replace('width="19" height="19"', 'width="13" height="13"');

// How far everything that isn't the focused route recedes.
const DIM = {line: .03, stop: .07, tiles: .2, home: .15, pin: .1};

const pinLayer = L.layerGroup().addTo(map);
const GONE = "#5a6070";   // this one has already gone past our stop

/** Board pins first (they carry the ETA), then any fleet vehicle not among them. */
function allPins(){
  const rows = (board?.vehicles ?? []).map(v => ({...v, serving:true}));
  const seen = new Set(rows.map(v => v.vehicleId));
  return rows.concat(fleet.filter(v => !seen.has(v.vehicleId)));
}

function renderPins(){
  pinLayer.clearLayers();
  for(const v of allPins().filter(v => onMap(v.line))){
    const rail = v.mode === "rail";
    const night = v.line.startsWith("N");
    // "mine" — this vehicle belongs to whatever the map is currently about.
    const mine = !FS.active || FS.keys.has(v.key);
    const gone = v.serving === false;
    const dim = FS.active && !mine;
    const bg = gone ? GONE : rail ? "#823a62" : night ? "#1b2a6b" : "#e1251b";
    const arrow = gone ? "#8a90a0" : rail ? "#c184a9" : night ? "#5b6ed6" : "#ff5a4d";
    const glyph = rail ? TRAIN_GLYPH_SM : BUS_GLYPH;
    const label = rail ? shortDest(v.to) : v.line;
    // Count down from the same timestamp the row uses. A frozen etaMin drifts up
    // to a full refresh behind, and rounding it disagreed with the row's m:ss.
    const eta = pinEta(v.expected, v.etaMin);
    // The bus sits at the anchor (45,42): a round pin carrying the bus glyph.
    // A 40px box centred on it is rotated by the bearing, swinging its triangle
    // round to the side the bus is heading. The banner floats clear above both.
    // Anchor (50,52) is the vehicle. The round pin is 26px across, so the arrow
    // orbits at a 28px radius to clear it, and is painted last so it always wins.
    const icon = L.divIcon({className:"", iconSize:[100,84], iconAnchor:[50,52], html:
      `<div style="width:100px;height:84px;position:relative;opacity:${dim ? DIM.pin : 1}">
         <div style="position:absolute;left:50px;top:0;transform:translateX(-50%);white-space:nowrap;
                     background:${bg};color:#fff;font:800 9.5px/1 system-ui;
                     padding:3px 5px;border-radius:4px;border:1px solid #0f1115">
           ${esc(label)}${eta ? ` <span class="pineta" data-exp="${v.expected ?? ""}" data-min="${v.etaMin ?? ""}"
                 style="font-weight:600;opacity:.85">${esc(eta)}</span>` : ""}
         </div>
         <div style="position:absolute;left:37px;top:39px;width:26px;height:26px;border-radius:50%;
                     background:${bg};border:2px solid #0f1115;box-shadow:0 0 0 1.5px ${arrow};
                     display:grid;place-items:center">${glyph}</div>
         <div class="pin-arrow" data-bearing="${v.bearing}"
              style="position:absolute;left:18px;top:20px;width:64px;height:64px;
                     transform:rotate(${v.bearing}deg);pointer-events:none">
           <div style="width:0;height:0;margin:0 auto;border:5px solid transparent;
                       border-bottom:9px solid ${arrow}"></div>
         </div>
       </div>`});
    const when = v.etaMin == null ? "already past your stop"
      : `${eta === "Due" ? "Due" : eta.replace("m", " min")} at ${esc(shortStop(v.stop ?? "your stop"))}`;
    const marker = L.marker([v.lat, v.lon], {icon, zIndexOffset: dim ? 500 : gone ? 800 : 1000}).addTo(pinLayer);
    infoOn(marker, `<b>${esc(v.line)} → ${esc(shortDest(v.to))}</b><br>
        ${when}<br>
        <span style="color:#9aa3b2">heading ${compass(v.bearing)} · estimated position · ${esc(v.vehicleId)}</span>`);
  }
}

const COMPASS = ["N","NE","E","SE","S","SW","W","NW"];
const compass = brg => COMPASS[Math.round((brg % 360) / 45) % 8];

function applyMapFilter(){
  // When something is focused, everything else on the map recedes — including
  // the basemap and home — so the one route you tapped is what you see.
  const focused = FS.active;
  // Narrowing by chip is also an act of attention: what survives should be at
  // full strength, not the muted weight used when all ten lines are drawn.
  const attention = focused || activePairs().length > 0;

  for(const [key, lines] of busLines){
    const line = key.split("|")[1];
    const hidden = !onMap(line);
    const night = line.startsWith("N");
    const dim = focused && !FS.keys.has(key);
    const base = night ? .45 : .6;
    for(const l of lines) l.setStyle({
      opacity: hidden ? 0 : dim ? DIM.line : attention ? .95 : base,
      weight: !hidden && attention && !dim ? (night ? 3.5 : 4.5) : (night ? 2.5 : 3.5),
    });
  }

  // An arrow belongs to the roads a route-direction actually drives. Focusing a
  // row hides arrows on streets that row never touches.
  for(const a of arrowMarkers){
    const live = a.lines.some(onMap);
    const mine = !focused || a.pairs.some(pr => FS.keys.has(`bus|${pr}`));
    a.marker.setOpacity(!live ? 0 : !mine ? 0 : .9);
  }

  const railHidden = !onMap("Weaver");
  const railDim = focused && ![...FS.keys].some(k => k.startsWith("rail|"));
  for(const l of railLines) l.setStyle({
    opacity: railHidden ? 0 : railDim ? DIM.line : .95,
    weight: !railHidden && focused && !railDim ? 6 : 5,
  });

  const act = activeStops();
  // Of the stops a route calls at, only some are ones *this board* departs from.
  // Rectory Road (L) is on the 76's route but the board catches the 76 at
  // Northwold Road — so it must not keep its big white ring while the 76 is up.
  const boardStops = act ? new Set((board?.buses ?? [])
    .filter(r => FS.keys.has(`bus|${r.line}|${r.dir}`) || activePairs().includes(`${r.line}|${r.dir}`))
    .map(r => r.stopId)) : null;
  if(act && selected.has("Weaver")) boardStops.add(RAIL_STOP);

  for(const s of stopMarkers){
    const serves = s.lines.some(onMap);
    // With a route in view, light every stop it calls at, not just the board's.
    const dim = !serves || (act ? !act.all.has(s.id)
                                : (focused && !FS.stops.has(s.id)));
    const o = dim ? DIM.stop : 1;
    const departsHere = !act || boardStops.has(s.id);
    if(s.marker.setOpacity) s.marker.setOpacity(o);
    else{
      s.marker.setStyle({
        opacity:o, fillOpacity:o,
        ...(s.base && !dim && !departsHere
            ? {radius:4, color:"#6c7484", weight:1.5}   // the route calls, you don't board
            : s.base ?? {}),
      });
    }
    const tip = s.marker.getTooltip && s.marker.getTooltip();
    // Only label a stop you would actually walk to.
    if(tip && tip.getElement()) tip.getElement().style.opacity = (dim || !departsHere) ? 0 : o;
  }
  labelTermini(act);

  tiles.setOpacity(focused ? DIM.tiles : 1);
  if(homeMarker) homeMarker.setOpacity(focused ? DIM.home : 1);
  fitFocus();
}

// Focusing a row should frame the thing you asked about: the stop you would walk
// to, and the next vehicle heading for it. Refit only when the focus changes, or
// when the pin first arrives — never on each 60 s refresh, which would yank the
// map out from under a pan.
let lastFit = null;
function fitFocus(){
  // Nothing narrowed, or merely full-screen: leave the view where it is.
  if(!focus && !expanded()){ lastFit = null; return; }
  const pairs = activePairs();

  const pts = [];
  let sig;

  if(focus && focus.kind === "stop"){
    const stop = stopMarkers.find(s => s.id === focus.id);
    if(!stop) return;
    pts.push(stop.marker.getLatLng());
    let buses = 0;
    const keys = new Set(activePairs().map(pr => `bus|${pr}`));
    for(const dir of ["in", "out"]){
      const v = allPins()
        .filter(v => keys.has(v.key) && v.london === dir && v.serving !== false && v.etaMin != null)
        .sort((a,b) => a.etaMin - b.etaMin)[0];
      if(v){ pts.push(L.latLng(v.lat, v.lon)); buses++; }
    }
    sig = `stop:${focus.id}|${buses}`;
  }else if(focus && focus.kind === "route"){
    const stop = stopMarkers.find(s => FS.stops.has(s.id));
    if(!stop) return;
    pts.push(stop.marker.getLatLng());
    const pin = allPins()
      .filter(v => v.key === focus.key && v.serving !== false && v.etaMin != null)
      .sort((a,b) => a.etaMin - b.etaMin)[0];
    if(pin) pts.push(L.latLng(pin.lat, pin.lon));
    sig = `${focus.key}|${pin ? "pin" : "none"}`;
  }else{
    // Chip filter or a whole direction: every stop the board uses for these
    // routes, plus the soonest bus in each direction so both ends are on screen.
    const keys = new Set(pairs.map(pr => `bus|${pr}`));
    const stopIds = new Set((board.buses ?? [])
      .filter(r => keys.has(`bus|${r.line}|${r.dir}`)).map(r => r.stopId));
    if(selected.has("Weaver")) stopIds.add(RAIL_STOP);
    for(const s of stopMarkers) if(stopIds.has(s.id)) pts.push(s.marker.getLatLng());

    let buses = 0;
    for(const dir of ["in", "out"]){
      const v = allPins()
        .filter(v => keys.has(v.key) && v.london === dir && v.serving !== false && v.etaMin != null)
        .sort((a,b) => a.etaMin - b.etaMin)[0];
      if(v){ pts.push(L.latLng(v.lat, v.lon)); buses++; }
    }
    sig = `${[...keys].sort().join(",")}|${stopIds.size}|${buses}`;
  }

  if(!pts.length || sig === lastFit) return;
  lastFit = sig;
  // One point is not a view. Fall back to the frame the board opens on.
  if(pts.length < 2){
    if(homeBounds) map.fitBounds(homeBounds, {maxZoom: 16, animate: true});
    return;
  }
  map.fitBounds(L.latLngBounds(pts).pad(0.3), {maxZoom: 16, animate: true});
}

/** Name the first and last stop of each route in view; the board's own stops
    already carry permanent labels, so they are left alone. */
function labelTermini(act){
  while(tempTips.length){
    const s = tempTips.pop();
    s.marker.unbindTooltip();
  }
  if(!act) return;
  for(const s of stopMarkers){
    if(s.onBoard || !act.ends.has(s.id)) continue;
    s.marker.bindTooltip(esc(shortStop(s.name ?? s.id)),
      {permanent:true, direction:"right", offset:[7,0], className:"maplabel terminus"});
    tempTips.push(s);
  }
}

// ---------- polling ----------
let lastOk = 0;
async function refresh(){
  try{
    const res = await fetch(API, {cache:"no-store"});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    board = await res.json();
    renderWeather(board.weather);
    renderAll();
    lastOk = Date.now();
    stamp.className = "stamp";
    stamp.textContent = `Updated ${new Date(board.ts * 1000).toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit", second:"2-digit"})}`;
  }catch(e){
    const age = lastOk ? Math.round((Date.now() - lastOk) / 1000) : null;
    stamp.className = "stamp " + (lastOk ? "stale" : "err");
    stamp.textContent = lastOk ? `Stale — last update ${age}s ago` : `Cannot reach board API (${e.message})`;
  }
}

// A wallboard nobody has touched for an hour should be showing everything again.
const RESET_AFTER_MS = 3600000;
let lastTouch = Date.now();
const touched = () => { lastTouch = Date.now(); };
["click","touchstart","keydown"].forEach(ev => document.addEventListener(ev, touched, {passive:true}));
function maybeReset(){
  const idle = Date.now() - lastTouch > RESET_AFTER_MS;
  const isDefault = !focus && !userChose
    && selected.size === DEFAULT_LINES.length && DEFAULT_LINES.every(l => selected.has(l));
  if(!idle || isDefault) return false;
  focus = null;
  userChose = false;
  selected = new Set(DEFAULT_LINES);
  renderFilters();
  renderAll();
  if(homeBounds) map.fitBounds(homeBounds, {maxZoom: 16});
  return true;
}
setInterval(maybeReset, 60000);

renderFilters();
refresh();
setInterval(refresh, REFRESH_MS);
document.addEventListener("visibilitychange", () => { if(!document.hidden) refresh(); });
</script>
</body>
