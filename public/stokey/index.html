<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stoke Newington Board</title>
<link rel="manifest" href="/stokey/manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/icon.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root{
    --bg:#0f1115;--ink:#e6e8ee;--muted:#9aa3b2;--rule:#242a36;--panel:#161a22;--row:#111523;
    --weaver:#823a62;--bus:#e1251b;--night:#1b2a6b;
    --ok:#20c05b;--warn:#f2c94c;--bad:#ff6b6b;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--ink);overflow:hidden;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
    display:flex;flex-direction:column;min-height:100dvh;
    padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
  }

  header{padding:8px 14px;border-bottom:1px solid var(--rule);display:flex;gap:16px;align-items:flex-end;justify-content:space-between}
  .clock{font-size:clamp(52px,6.4vw,96px);font-weight:800;line-height:1;letter-spacing:.5px;font-variant-numeric:tabular-nums}
  .clock .sec{font-size:.45em;font-weight:600;opacity:.85}
  .headmeta{flex:1;display:flex;flex-direction:column;align-items:flex-end;text-align:right;min-width:0}
  .stamp{font-size:13px;color:var(--muted);margin-top:6px}
  .stamp.stale{color:var(--warn)}
  .stamp.err{color:var(--bad)}

  .wx{display:flex;align-items:center;gap:14px;margin-top:8px}
  .wx .now{display:flex;align-items:baseline;gap:8px}
  .wx .temp{font-size:34px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .wx .icon{font-size:30px;line-height:1}
  .wx .meta{font-size:13px;color:var(--muted);text-align:right;line-height:1.35}
  .hours{display:flex;gap:12px;border-left:1px solid var(--rule);padding-left:14px}
  .hour{text-align:center;font-size:12px;color:var(--muted);line-height:1.35}
  .hour .hicon{display:block;font-size:17px;line-height:1.25}
  .hour b{display:block;color:var(--ink);font-size:14px;font-variant-numeric:tabular-nums}

  /* Chips remove a line entirely. Tapping a row or a labelled stop dims the
     rest instead — a focus, not a filter. */
  .filters{display:flex;flex-wrap:wrap;gap:7px;padding:9px 14px 0}
  .chip{font:800 12px/1 system-ui;color:#fff;border:1px solid transparent;border-radius:999px;
        padding:6px 11px;cursor:pointer;opacity:.32;background:#e1251b;transition:opacity .12s ease}
  .chip.weaver{background:var(--weaver)} .chip.night{background:var(--night)}
  .chip.on{opacity:1}
  .chip:focus-visible{outline:2px solid #fff;outline-offset:1px}

  .wrap{padding:12px;display:flex;flex:1;min-height:0}
  .cols{display:grid;gap:12px;width:100%;grid-template-columns:1.15fr 1.15fr 0.95fr}
  @media (max-aspect-ratio:1/1){.cols{grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr}#mapPanel{grid-column:1/-1;min-height:340px}}
  .panel{background:var(--panel);border-radius:14px;padding:10px 12px;display:flex;flex-direction:column;min-height:0}
  .panel h2{margin:0 0 10px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
  .panel h2 .count{color:var(--muted);font-weight:600;font-size:13px}
  .panelsub{font-size:11px;color:var(--muted);margin:-6px 0 9px}
  .list{display:flex;flex-direction:column;gap:8px;overflow:auto;flex:1;min-height:0;padding-right:4px}
  .empty{color:var(--muted);font-size:14px;padding:16px 4px}

  .row{border:1px solid var(--rule);border-radius:12px;padding:8px 11px;background:var(--row);
       display:grid;grid-template-columns:auto 1fr auto;gap:11px;align-items:center;
       cursor:pointer;transition:opacity .12s ease}
  .row.dim{opacity:.3}
  .badge{min-width:42px;height:31px;border-radius:8px;display:grid;place-items:center;
         font-weight:800;font-size:16px;color:#fff;background:var(--bus);font-variant-numeric:tabular-nums}
  .badge.night{background:var(--night)}
  .badge.rail{background:var(--weaver);min-width:56px;font-size:11.5px;letter-spacing:.02em}
  .mid{min-width:0}
  .late{color:var(--bad);font-weight:700}
  .ontime{color:var(--ok);font-weight:700}
  .cancelled{color:var(--bad);font-weight:700}
  .from s{opacity:.65;text-decoration-thickness:1px}
  .row.off{opacity:.55}
  .row.off .etas .n{text-decoration:line-through;color:var(--bad)}
  .to{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .from{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Fixed columns so the big number, the unit and the follow-ups line up down
     the list regardless of "Due" vs "1" vs "12". */
  .etas{display:grid;grid-template-columns:36px 21px 46px;gap:3px;align-items:baseline;
        font-variant-numeric:tabular-nums}
  .etas .n{font-size:21px;font-weight:800;text-align:right}
  .etas .n.due{font-size:17px;color:var(--ok)}
  .etas .unit{font-size:12px;color:var(--muted);text-align:left}
  .etas .rest{font-size:13px;color:var(--muted);text-align:right}

  #mapPanel{padding:0;overflow:hidden;position:relative}
  #map{flex:1;min-height:0;background:#0b0d11;border-radius:14px}
  .leaflet-container{background:#0b0d11}
  .recentre{position:absolute;right:10px;top:10px;z-index:600;width:32px;height:32px;
            background:rgba(15,17,21,.86);color:var(--ink);border:1px solid var(--rule);
            border-radius:8px;font-size:15px;cursor:pointer;line-height:1}
  .maplabel{background:rgba(15,17,21,.82)!important;border:none!important;box-shadow:none!important;
            color:var(--ink)!important;font:700 10px system-ui;padding:2px 5px!important;
            border-radius:4px;transition:opacity .12s ease}
  .maplabel::before{display:none!important}
  .maplabel.rail{color:#e8c6dd!important}
  .leaflet-control-zoom{border:none!important}
  .leaflet-control-zoom a{background:rgba(15,17,21,.86)!important;color:var(--ink)!important;
                          border:1px solid var(--rule)!important}
  .maplegend{position:absolute;left:12px;bottom:12px;z-index:500;background:rgba(15,17,21,.86);
             border:1px solid var(--rule);border-radius:10px;padding:8px 10px;font-size:12px;
             display:flex;flex-direction:column;gap:5px;backdrop-filter:blur(4px)}
  .maplegend div{display:flex;align-items:center;gap:7px;color:var(--muted)}
  .swatch{width:16px;height:3.5px;border-radius:2px}
  .dot{width:9px;height:9px;border-radius:50%;border:2px solid #fff;background:#0f1115}
  .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#1b2030;color:var(--ink)}
  .leaflet-popup-content{margin:9px 12px;font-size:13px;line-height:1.5}
  .leaflet-popup-content b{font-size:14px}
  .leaflet-control-attribution{background:rgba(15,17,21,.75)!important;color:#6c7484!important}
  .leaflet-control-attribution a{color:#8a93a5!important}
</style>
</head>
<body>
<header>
  <div class="clock" id="clock">--:--<span class="sec">:--</span></div>
  <div class="headmeta">
    <div class="wx" id="wx"></div>
    <div class="stamp" id="stamp">Loading&hellip;</div>
  </div>
</header>
<div class="filters" id="filters"></div>

<div class="wrap">
  <div class="cols">
    <section class="panel">
      <h2>Into London <span class="count" id="inCount"></span></h2>
      <div class="panelsub">Towards the centre &middot; station is a 6 min walk</div>
      <div class="list" id="inList"><div class="empty">Loading&hellip;</div></div>
    </section>

    <section class="panel">
      <h2>Out of London <span class="count" id="outCount"></span></h2>
      <div class="panelsub">Away from the centre &middot; station is a 6 min walk</div>
      <div class="list" id="outList"><div class="empty">Loading&hellip;</div></div>
    </section>

    <section class="panel" id="mapPanel">
      <div id="map"></div>
      <button class="recentre" id="recentre" title="Back to Stoke Newington">&#9678;</button>
      <div class="maplegend">
        <div><span class="swatch" style="background:var(--weaver);height:4px"></span> Weaver line</div>
        <div><span class="swatch" style="background:var(--bus)"></span> Bus routes</div>
        <div><span class="dot" style="border-color:#fff"></span> Stop on board</div>
        <div><span class="dot" style="border-color:#6c7484"></span> Other stop &le;10 min walk</div>
        <div><span style="color:#ff5a4d;font-size:11px">&#9650;</span> Next bus <i>(estimated)</i></div>
      </div>
    </section>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const API = "/api/board/stokey";
const REFRESH_MS = 60000;
const HOME = [51.5611161, -0.0739865];

const walkMins = m => Math.max(1, Math.round(m));

// "Northwold Road / Stoke Newington Common" is a fine sign but a poor label: the
// first segment identifies the stop, and every stop here is in Stoke Newington
// so the prefix is dead weight.
function shortStop(s){
  const first = String(s ?? "").split("/")[0].trim();
  const trimmed = first.replace(/^Stoke Newington\s+/i, "");
  return trimmed || first;
}

// ---------- clock ----------
const pad = n => String(n).padStart(2, "0");
function tickClock(){
  const d = new Date();
  clock.innerHTML = `${pad(d.getHours())}:${pad(d.getMinutes())}<span class="sec">:${pad(d.getSeconds())}</span>`;
}
setInterval(tickClock, 1000); tickClock();

const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// ---------- weather ----------
// WMO code -> [emoji day, emoji night, label]
const WMO = {
  0:["☀️","🌙","Clear"], 1:["🌤️","🌙","Mostly clear"], 2:["⛅","☁️","Partly cloudy"], 3:["☁️","☁️","Overcast"],
  45:["🌫️","🌫️","Fog"], 48:["🌫️","🌫️","Rime fog"],
  51:["🌦️","🌦️","Light drizzle"], 53:["🌦️","🌦️","Drizzle"], 55:["🌦️","🌦️","Heavy drizzle"],
  56:["🌧️","🌧️","Freezing drizzle"], 57:["🌧️","🌧️","Freezing drizzle"],
  61:["🌦️","🌦️","Light rain"], 63:["🌧️","🌧️","Rain"], 65:["🌧️","🌧️","Heavy rain"],
  66:["🌧️","🌧️","Freezing rain"], 67:["🌧️","🌧️","Freezing rain"],
  71:["🌨️","🌨️","Light snow"], 73:["🌨️","🌨️","Snow"], 75:["❄️","❄️","Heavy snow"], 77:["❄️","❄️","Snow grains"],
  80:["🌦️","🌦️","Showers"], 81:["🌧️","🌧️","Showers"], 82:["⛈️","⛈️","Violent showers"],
  85:["🌨️","🌨️","Snow showers"], 86:["❄️","❄️","Snow showers"],
  95:["⛈️","⛈️","Thunderstorm"], 96:["⛈️","⛈️","Thunder, hail"], 99:["⛈️","⛈️","Thunder, hail"],
};
const hhmm = epoch => new Date(epoch * 1000).toLocaleTimeString("en-GB",
  {hour:"2-digit", minute:"2-digit", timeZone:"Europe/London"});

const wmoIcon = (code, isDay) => (WMO[code] ?? ["🌡️","🌡️","—"])[isDay ? 0 : 1];
const wmoLabel = code => (WMO[code] ?? ["","","—"])[2];

function renderWeather(w){
  if(!w){ wx.innerHTML = ""; return; }
  const hours = w.next.slice(0, 4).map(h => `
    <div class="hour">${hhmm(h.at).slice(0,2)}
      <span class="hicon">${wmoIcon(h.code, h.isDay)}</span>
      <b>${Math.round(h.tempC)}°</b></div>`).join("");
  wx.innerHTML = `
    <div class="now">
      <span class="icon">${wmoIcon(w.code, w.isDay)}</span>
      <span class="temp">${Math.round(w.tempC)}°</span>
    </div>
    <div class="meta">${esc(wmoLabel(w.code))}</div>
    <div class="hours">${hours}</div>`;
}

// ---------- departures ----------
// Always three cells, even when empty, so the grid columns align down the list.
const etaHTML = (first, rest) => {
  const due = first === 0;
  return `<span class="n ${due ? "due" : ""}">${due ? "Due" : first}</span>`
       + `<span class="unit">${due ? "" : "min"}</span>`
       + `<span class="rest">${rest ? esc(rest) : ""}</span>`;
};

// "Platform 1" overflows the narrow rail column; "Plat 1" fits.
const plat = p => (p && p !== "—") ? esc(p.replace(/^Platform\s+/i, "Plat ")) : "";

// TfL terminus names are written for a 40-char sign, not a board column.
// Where a name is two places joined by "/", the recognisable one is almost
// always the station: "Great Titchfield St / Oxford Circus Stn" -> "Oxford Circus Stn".
function shortDest(name){
  const norm = s => s
    .replace(/,\s*/g, " ")          // TfL writes "Tottenham Hale, Bus Station"
    .replace(/\s+/g, " ").trim()
    .replace(/\s+Rail Station$/i, "")
    .replace(/\s+Bus Station$/i, " Bus Stn")
    .replace(/\s+Station$/i, " Stn");
  const s = norm(String(name ?? "—"));
  if(s.length <= 24 || !s.includes("/")) return s;
  const parts = s.split("/").map(norm);
  return parts.find(p => /\bStn\b/.test(p)) ?? parts[0];
}

// Rail and bus share a column, split by whether they head into London or out of
// it, and interleave by ETA — the question a board answers is "what do I catch
// next", not "what mode is it".
const RAIL_STOP = "910GSTKNWNG";  // the only station with rows on this board

const railRow = r => ({rail:true, line:"Weaver", to:r.to, plat:r.plat,
                       key:`rail|${r.to}`, stopId:RAIL_STOP,
                       delayMin:r.delayMin, cancelled:r.cancelled,
                       scheduled:r.scheduled, expected:r.expected, etas:[]});

const railGroups = (rows, dir) => {
  const of = rows.filter(r => r.london === dir);
  // Once a line has been filtered down there is room to give every train its
  // own row, the way the Stratford board does it.
  if(expanded()) return of.map(r => ({...railRow(r), etas:[r.etaMin], one:true}));
  const m = new Map();
  for(const r of of){
    if(!m.has(r.to)) m.set(r.to, railRow(r));
    m.get(r.to).etas.push(r.etaMin);
  }
  return [...m.values()];
};

// Only the Weaver has a schedule to be late against. TfL exposes no scheduled
// time for buses, and there is no supported way to join a live bus to a
// timetabled trip — so a bus row never claims to know its delay.
const clockTime = iso => iso
  ? new Date(iso).toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit", timeZone:"Europe/London"})
  : "";

function statusHTML(g){
  if(!g.rail || !g.scheduled) return "";
  const sched = clockTime(g.scheduled);
  if(g.cancelled) return ` · <s>${sched}</s> <span class="cancelled">Cancelled</span>`;
  // TfL flags trains "Delayed" while still showing 0 min late; don't cry wolf.
  if(g.delayMin >= 1) return ` · <s>${sched}</s> <span class="late">${clockTime(g.expected)}</span>`;
  return ` · <span class="ontime">${sched}</span>`;
}

const busRow = r => ({rail:false, line:r.line, to:r.to, stop:r.stop, letter:r.letter,
                      walk:r.walkMin, key:`bus|${r.line}|${r.dir}`, stopId:r.stopId,
                      expected:r.expected, etas:[]});

const busGroups = (rows, dir) => {
  const of = rows.filter(r => r.london === dir);
  if(expanded()) return of.map(r => ({...busRow(r), etas:[r.etaMin], one:true}));
  const m = new Map();
  for(const r of of){
    const k = `bus|${r.line}|${r.dir}`;
    if(!m.has(k)) m.set(k, busRow(r));
    m.get(k).etas.push(r.etaMin);
  }
  return [...m.values()];
};

const rowHTML = g => {
  const badge = g.rail
    ? `<div class="badge rail">Weaver</div>`
    : `<div class="badge ${g.line.startsWith("N") ? "night" : ""}">${esc(g.line)}</div>`;
  // Only one station on this board, and the badge already names the line, so
  // lead with the platform — it is the part that changes.
  const sub = g.rail
    ? `${plat(g.plat) ? plat(g.plat) : "Station"}${statusHTML(g)}`
    : `${esc(shortStop(g.stop))}${g.letter ? " (" + esc(g.letter) + ")" : ""} · ${walkMins(g.walk)} min walk`;
  // Grouped: this ETA plus the two after it. One-per-vehicle: its clock time.
  // A rail row already carries its times in the sub-line; don't print them twice.
  const rest = g.one
    ? (g.rail ? "" : clockTime(g.expected))
    : g.etas.slice(1, 3).join(" · ");
  return `
    <div class="row ${g.cancelled ? "off" : ""} ${focusMatchesRow(g) ? "" : "dim"}"
         data-key="${esc(g.key)}" data-stop="${esc(g.stopId ?? "")}">
      ${badge}
      <div class="mid">
        <div class="to">${esc(shortDest(g.to))}</div>
        <div class="from">${sub}</div>
      </div>
      <div class="etas">${etaHTML(g.etas[0], rest)}</div>
    </div>`;
};

// ---------- filtering ----------
// Two independent mechanisms, on purpose:
//   chips  — remove whole lines from the board and the map
//   focus  — tap a row or a map stop to dim everything else, without removing it
const SERVICES = ["Weaver", "67", "73", "76", "106", "149", "243", "276", "393", "476", "N73"];
let selected = new Set(SERVICES);

// With every line shown there are ~20 routes and no room per departure, so rows
// are grouped per route with the next three ETAs. Once chips narrow the board,
// give each vehicle its own row instead — the Stratford layout.
function expanded(){ return selected.size !== SERVICES.length; }
let focus = null;          // {kind:"route", key} | {kind:"stop", id} | null
let board = null;          // last payload

const lineOf = g => g.rail ? "Weaver" : g.line;
const shown = g => selected.has(lineOf(g));

/** Which routes and stops the current focus resolves to. Recomputed per render. */
function focusSets(){
  const keys = new Set(), stops = new Set();
  if(!focus || !board) return {keys, stops, active:false};
  const groups = allGroups().filter(shown);
  for(const g of groups){
    const hit = focus.kind === "route" ? g.key === focus.key : g.stopId === focus.id;
    if(hit){ keys.add(g.key); stops.add(g.stopId); }
  }
  return {keys, stops, active:true};
}
let FS = {keys:new Set(), stops:new Set(), active:false};

const focusMatchesRow = g => !FS.active || FS.keys.has(g.key);

function allGroups(){
  if(!board) return [];
  return ["in","out"].flatMap(d =>
    [...railGroups(board.rail ?? [], d), ...busGroups(board.buses ?? [], d)]);
}

function renderFilters(){
  filters.innerHTML = SERVICES.map(id => {
    const cls = id === "Weaver" ? "weaver" : id.startsWith("N") ? "night" : "bus";
    return `<button class="chip ${cls} ${selected.has(id) ? "on" : ""}" data-line="${id}">${esc(id)}</button>`;
  }).join("");
}

// Same behaviour as the Stratford board: from "everything shown", the first tap
// isolates that line rather than hiding it — one tap to see just the 73. After
// that a tap toggles, and clearing the last one shows everything again.
filters.addEventListener("click", e => {
  const b = e.target.closest(".chip");
  if(!b) return;
  const id = b.dataset.line;
  if(selected.size === SERVICES.length){
    selected = new Set([id]);
  }else if(selected.has(id)){
    selected.delete(id);
    if(selected.size === 0) selected = new Set(SERVICES);
  }else{
    selected.add(id);
  }
  if(focus && !focusStillVisible()) focus = null;
  renderFilters();   // the chip's own on/off state lives in this markup
  renderAll();
});

function focusStillVisible(){
  return allGroups().filter(shown).some(g =>
    focus.kind === "route" ? g.key === focus.key : g.stopId === focus.id);
}

function onRowClick(e){
  const row = e.target.closest(".row");
  if(!row) return;
  const key = row.dataset.key;
  focus = (focus && focus.kind === "route" && focus.key === key) ? null : {kind:"route", key};
  renderAll();
}
inList.addEventListener("click", onRowClick);
outList.addEventListener("click", onRowClick);

function focusStop(id){
  focus = (focus && focus.kind === "stop" && focus.id === id) ? null : {kind:"stop", id};
  renderAll();
}

function renderDirection(dir, listEl, countEl){
  const groups = [...railGroups(board.rail ?? [], dir), ...busGroups(board.buses ?? [], dir)]
    .filter(shown)
    .sort((a,b) => a.etas[0] - b.etas[0]);
  countEl.textContent = groups.length
    ? `${groups.length} ${expanded() ? "departures" : "routes"}` : "";
  listEl.innerHTML = groups.length
    ? groups.map(rowHTML).join("")
    : '<div class="empty">Nothing due.</div>';
}

function renderAll(){
  if(!board) return;
  FS = focusSets();
  renderDirection("in",  inList,  inCount);
  renderDirection("out", outList, outCount);
  renderPins(board.vehicles ?? []);
  applyMapFilter();
}

// ---------- map ----------
// Routes and stops run the full length of each line, so the board opens framed
// on the flat but you can pan out to any terminus.
const map = L.map("map", {zoomControl:true, attributionControl:true});
const tiles = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  subdomains:"abcd", maxZoom:19,
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
}).addTo(map);
map.setView(HOME, 15);

const busLines = new Map();   // "bus|73|inbound" -> [polyline]
const railLines = [];
const stopMarkers = [];       // {id, marker, lines, onBoard}
let homeMarker = null;
let homeBounds = null;

fetch("/stokey/geo.json").then(r => r.json()).then(geo => {
  const of = kind => geo.features.filter(f => f.properties.kind === kind);

  for(const f of of("bus")){
    const p = f.properties, key = `bus|${p.line}|${p.dir}`;
    const line = L.geoJSON(f, {style:{
      color: p.night ? "#5b6ed6" : "#e1251b",
      weight: p.night ? 2.5 : 3.5, opacity: p.night ? .45 : .6,
      dashArray: p.night ? "3 6" : null,
    }}).addTo(map);
    if(!busLines.has(key)) busLines.set(key, []);
    busLines.get(key).push(line);
  }

  for(const f of of("rail")) railLines.push(L.geoJSON(f, {style:{color:"#823a62", weight:5, opacity:.95}}).addTo(map));

  // Every stop gets a dot and a popup. Only the board's 7 get a permanent label.
  for(const f of of("stop")){
    const p = f.properties, [lon, lat] = f.geometry.coordinates;
    const on = p.onBoard, near = p.near;
    const m = L.circleMarker([lat, lon], {
      radius: on ? 7 : near ? 4 : 2.5,
      color: on ? "#fff" : near ? "#6c7484" : "#4a5162",
      weight: on ? 2 : 1.5, fillColor: "#0f1115", fillOpacity: 1,
    }).bindPopup(`<b>${esc(p.name)}</b>${p.letter ? " (" + esc(p.letter) + ")" : ""}<br>
      ${p.walk_min != null ? walkMins(p.walk_min) + " min walk · " : ""}${esc(p.lines.join(", "))}
      ${p.towards ? `<br><span style="color:#9aa3b2">towards ${esc(p.towards)}</span>` : ""}`).addTo(map);
    if(on){
      m.bindTooltip(`${esc(shortStop(p.name))}${p.letter ? " " + esc(p.letter) : ""}`,
        {permanent:true, direction:"right", offset:[7,0], className:"maplabel"});
      m.on("click", e => { L.DomEvent.stopPropagation(e); focusStop(p.id); });
    }
    stopMarkers.push({id:p.id, marker:m, lines:p.lines, onBoard:on, rail:false});
  }

  for(const f of of("station")){
    const p = f.properties, [lon, lat] = f.geometry.coordinates;
    const on = p.onBoard;  // Rectory Road is a 7.7 min walk, but every train calls here first
    const size = on ? 15 : 9;
    const m = L.marker([lat, lon], {icon: L.divIcon({className:"", iconSize:[size,size], html:
      `<div style="width:${size}px;height:${size}px;background:#823a62;
                   border:${on ? 2.5 : 1.5}px solid ${on ? "#fff" : "#8a6d7c"};border-radius:3px"></div>`})})
      .bindPopup(`<b>${esc(p.name)}</b><br>Weaver line${p.walk_min != null ? ` · ${walkMins(p.walk_min)} min walk` : ""}`)
      .addTo(map);
    if(on){
      m.bindTooltip(esc(p.name), {permanent:true, direction:"right", offset:[9,0], className:"maplabel rail"});
      m.on("click", e => { L.DomEvent.stopPropagation(e); focusStop(p.id); });
    }
    stopMarkers.push({id:p.id, marker:m, lines:["Weaver"], onBoard:on, rail:true});
  }

  const [lon, lat] = of("home")[0].geometry.coordinates;
  homeMarker = L.marker([lat, lon], {icon: L.divIcon({className:"", iconSize:[17,17], html:
    `<div style="width:17px;height:17px;background:#20c05b;border:3px solid #0f1115;border-radius:50%;
                 box-shadow:0 0 0 2px #20c05b"></div>`})}).bindPopup("<b>Home</b><br>149 Stoke Newington High St").addTo(map);

  // Open framed on what the board uses: its 7 stops, the station, home.
  homeBounds = L.latLngBounds(
    of("stop").filter(f => f.properties.onBoard).concat(of("station").filter(f => f.properties.onBoard))
      .map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0]])
  ).extend([lat, lon]).pad(0.18);
  map.fitBounds(homeBounds, {maxZoom: 16});
  applyMapFilter();
}).catch(e => console.error("geo.json", e));

map.on("click", () => { if(focus){ focus = null; renderAll(); } });
recentre.addEventListener("click", () => homeBounds && map.fitBounds(homeBounds, {maxZoom: 16}));

// ---------- live buses ----------
// Positions are estimated (TfL publishes no bus coordinates); see src/vehicles.ts.
const BUS_GLYPH = `<svg viewBox="0 0 24 24" width="10" height="10" fill="#fff" aria-hidden="true"><path d="M4 16c0 .88.39 1.67 1 2.22V20a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-1h8v1a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4S4 2.5 4 6v10Zm3.5 1a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm9 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3ZM18 11H6V6h12v5Z"/></svg>`;

const pinLayer = L.layerGroup().addTo(map);
function renderPins(pins){
  pinLayer.clearLayers();
  for(const v of pins.filter(v => selected.has(v.line))){
    const key = `bus|${v.line}|${v.dir}`;
    const night = v.line.startsWith("N");
    const dim = FS.active && !FS.keys.has(key);
    const bg = night ? "#1b2a6b" : "#e1251b";
    const arrow = night ? "#5b6ed6" : "#ff5a4d";
    const eta = v.etaMin === 0 ? "Due" : `${v.etaMin}m`;
    // The bus sits at the anchor (40,40). A 34px box centred there is rotated by
    // the bearing, swinging its triangle round to the side the bus is heading.
    // The label floats above so it never covers the arrow.
    const icon = L.divIcon({className:"", iconSize:[80,56], iconAnchor:[40,40], html:
      `<div style="width:80px;height:56px;position:relative;opacity:${dim ? .28 : 1}">
         <div class="pin-arrow" data-bearing="${v.bearing}"
              style="position:absolute;left:23px;top:23px;width:34px;height:34px;transform:rotate(${v.bearing}deg)">
           <div style="width:0;height:0;margin:0 auto;border:5px solid transparent;
                       border-bottom:9px solid ${arrow}"></div>
         </div>
         <div style="position:absolute;left:36px;top:36px;width:8px;height:8px;border-radius:50%;
                     background:${bg};border:1.5px solid #0f1115"></div>
         <div style="position:absolute;left:40px;top:0;transform:translateX(-50%);white-space:nowrap;
                     display:flex;align-items:center;gap:2.5px;
                     background:${bg};color:#fff;font:800 9px/1 system-ui;
                     padding:2.5px 4px;border-radius:4px;border:1px solid #0f1115">
           ${BUS_GLYPH}<span>${esc(v.line)}</span>
           <span style="font-weight:600;opacity:.85">${esc(eta)}</span>
         </div>
       </div>`});
    L.marker([v.lat, v.lon], {icon, zIndexOffset: dim ? 500 : 1000})
      .bindPopup(`<b>${esc(v.line)} → ${esc(shortDest(v.to))}</b><br>
        ${v.etaMin === 0 ? "Due" : v.etaMin + " min"} at ${esc(shortStop(v.stop))}<br>
        <span style="color:#9aa3b2">heading ${compass(v.bearing)} · estimated position · ${esc(v.vehicleId)}</span>`)
      .addTo(pinLayer);
  }
}

const COMPASS = ["N","NE","E","SE","S","SW","W","NW"];
const compass = brg => COMPASS[Math.round((brg % 360) / 45) % 8];

function applyMapFilter(){
  // When something is focused, everything else on the map recedes — including
  // the basemap and home — so the one route you tapped is what you see.
  const focused = FS.active;

  for(const [key, lines] of busLines){
    const line = key.split("|")[1];
    const hidden = !selected.has(line);
    const night = line.startsWith("N");
    const dim = focused && !FS.keys.has(key);
    const base = night ? .45 : .6;
    for(const l of lines) l.setStyle({
      opacity: hidden ? 0 : dim ? .08 : focused ? .95 : base,
      weight: !hidden && focused && !dim ? (night ? 3.5 : 4.5) : (night ? 2.5 : 3.5),
    });
  }

  const railHidden = !selected.has("Weaver");
  const railDim = focused && ![...FS.keys].some(k => k.startsWith("rail|"));
  for(const l of railLines) l.setStyle({
    opacity: railHidden ? 0 : railDim ? .08 : .95,
    weight: !railHidden && focused && !railDim ? 6 : 5,
  });

  for(const s of stopMarkers){
    const serves = s.lines.some(l => selected.has(l));
    const dim = !serves || (focused && !FS.stops.has(s.id));
    const o = dim ? .15 : 1;
    if(s.marker.setOpacity) s.marker.setOpacity(o);
    else s.marker.setStyle({opacity:o, fillOpacity:o});
    const tip = s.marker.getTooltip && s.marker.getTooltip();
    if(tip && tip.getElement()) tip.getElement().style.opacity = o;
  }

  tiles.setOpacity(focused ? .4 : 1);
  if(homeMarker) homeMarker.setOpacity(focused ? .35 : 1);
}

// ---------- polling ----------
let lastOk = 0;
async function refresh(){
  try{
    const res = await fetch(API, {cache:"no-store"});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    board = await res.json();
    renderWeather(board.weather);
    renderAll();
    lastOk = Date.now();
    stamp.className = "stamp";
    stamp.textContent = `Updated ${new Date(board.ts * 1000).toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit", second:"2-digit"})}`;
  }catch(e){
    const age = lastOk ? Math.round((Date.now() - lastOk) / 1000) : null;
    stamp.className = "stamp " + (lastOk ? "stale" : "err");
    stamp.textContent = lastOk ? `Stale — last update ${age}s ago` : `Cannot reach board API (${e.message})`;
  }
}

// A wallboard nobody has touched for an hour should be showing everything again.
const RESET_AFTER_MS = 3600000;
let lastTouch = Date.now();
const touched = () => { lastTouch = Date.now(); };
["click","touchstart","keydown"].forEach(ev => document.addEventListener(ev, touched, {passive:true}));
function maybeReset(){
  const idle = Date.now() - lastTouch > RESET_AFTER_MS;
  const filtered = focus || selected.size !== SERVICES.length;
  if(!idle || !filtered) return false;
  focus = null;
  selected = new Set(SERVICES);
  renderFilters();
  renderAll();
  if(homeBounds) map.fitBounds(homeBounds, {maxZoom: 16});
  return true;
}
setInterval(maybeReset, 60000);

renderFilters();
refresh();
setInterval(refresh, REFRESH_MS);
document.addEventListener("visibilitychange", () => { if(!document.hidden) refresh(); });
</script>
</body>
</html>
