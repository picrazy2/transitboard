<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stoke Newington · Cycle</title>
<meta name="description" content="Trains within a 10-minute cycle of Stoke Newington, into and out of London.">
<link rel="manifest" href="/stokey/cycle/manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="/stokey/cycle/icon.svg" type="image/svg+xml">
<link rel="icon" href="/stokey/cycle/icon-512.png" sizes="512x512" type="image/png">
<link rel="apple-touch-icon" href="/stokey/cycle/icon-512.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Transit Boards">
<meta property="og:title" content="Stoke Newington · Cycle">
<meta property="og:description" content="Trains within a 10-minute cycle, into and out of London.">
<meta property="og:url" content="https://board.akguo.com/stokey/cycle">
<meta property="og:image" content="https://board.akguo.com/stokey/cycle/og.png">
<meta property="og:image:width" content="1200"><meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Stoke Newington · Cycle">
<meta name="twitter:image" content="https://board.akguo.com/stokey/cycle/og.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="/stokey/board.css">
</head>
<body>
<header>
  <div class="clock" id="clock">--:--<span class="sec">:--</span><span class="ampm"> --</span></div>
  <div class="headmid"><div class="disrupt" id="disrupt"></div></div>
  <div class="headmeta"><div class="wx" id="wx"></div></div>
</header>
<div class="chiprow">
  <div class="filters" id="filters"></div>
  <div class="chipend">
    <div class="stamp" id="stamp">Loading&hellip;</div>
    <div class="modetog">
      <a href="/stokey/" data-mode="walk">Walk</a>
      <a href="/stokey/cycle/" data-mode="cycle">Cycle</a>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="cols" id="cols">
    <section class="panel" id="inPanel">
      <h2>Into London <span class="count" id="inCount"></span>
        <button class="only" data-dir="in" title="Show only this direction">Only</button></h2>
      <div class="list" id="inList"><div class="empty">Loading&hellip;</div></div>
    </section>
    <section class="panel" id="outPanel">
      <h2>Out of London <span class="count" id="outCount"></span>
        <button class="only" data-dir="out" title="Show only this direction">Only</button></h2>
      <div class="list" id="outList"><div class="empty">Loading&hellip;</div></div>
    </section>
    <section class="panel" id="mapPanel">
      <div id="map"></div>
      <div class="mapctl">
        <button id="fullscreen" title="Full screen">&#10530;</button>
        <button id="recentre" title="Back to Stoke Newington">&#9678;</button>
        <button id="passedBtn" title="Show vehicles that have passed" aria-pressed="false">&#128123;</button>
        <button id="legendBtn" title="Legend" aria-expanded="false">i</button>
      </div>
      <div class="mapinfo" id="mapinfo" hidden>
        <button class="infoclose" id="infoclose" title="Close">&times;</button>
        <div id="infobody"></div>
      </div>
      <div class="maplegend" id="maplegend" hidden>
        <div><span class="dot" style="border-color:#fff"></span> Station on board</div>
        <div><span class="dot" style="border-color:#5a6472"></span> Other nearby station</div>
        <div><span style="color:#c184a9;font-size:11px">&#9650;</span> Live train <i>(estimated)</i></div>
      </div>
      <div class="warnkey" id="warnkey"><b>&#9888;</b> too soon to reach</div>
    </section>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="/stokey/board.js"></script>
</body>
</html>
